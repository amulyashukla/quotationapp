<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKB Engineering - Quotation Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Left Section with Branding -->
        <div class="login-left">
            <div class="login-brand">
                <div class="logo-circle">
                    <i class="fas fa-cogs"></i>
                </div>
                <h1>AKB Engineering</h1>
                <p>Professional Quotation Management System</p>
            </div>
            <div class="login-features">
                <div class="feature-item">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Automated Quotations</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics Dashboard</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-users"></i>
                    <span>Customer Management</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-file-pdf"></i>
                    <span>PDF Export</span>
                </div>
            </div>
        </div>

        <!-- Right Section with Login Form -->
        <div class="login-right">
            <div class="login-form-wrapper">
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Enter your username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="demo-login">
                        <p>Demo Credentials:</p>
                        <p><strong>Username:</strong> admin | <strong>Password:</strong> 123456</p>
                    </div>
                </form>
            </div>

            <div class="theme-toggle">
                <button id="themeToggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
