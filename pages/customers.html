<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - AKB Engineering Quotation System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <i class="fas fa-cogs"></i>
                    </div>
                    <div class="sidebar-logo-text">
                        <h3>AKB</h3>
                        <p>Engineering</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="inquiries.html" class="nav-item">
                    <i class="fas fa-inbox"></i>
                    <span>Inquiries</span>
                </a>
                <a href="quotations.html" class="nav-item">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Quotations</span>
                </a>
                <a href="products.html" class="nav-item">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
                <a href="customers.html" class="nav-item active">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="user-profile">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <h4 id="userName">Admin</h4>
                        <p>Administrator</p>
                    </div>
                </a>
                <button class="btn btn-secondary btn-sm" data-action="logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="header-title">
                        <h1>Customers</h1>
                        <p>Manage customer database</p>
                    </div>
                </div>

                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="customerSearch" placeholder="Search customers...">
                    </div>

                    <div class="header-actions">
                        <button class="header-btn" id="themeToggleDashboard">
                            <i class="fas fa-moon"></i>
                        </button>
                        <button class="btn btn-primary btn-sm" id="addCustomerBtn">
                            <i class="fas fa-plus"></i> Add Customer
                        </button>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <!-- Customers Grid -->
                <div class="card">
                    <div class="card-header">
                        <h2>All Customers</h2>
                    </div>
                    <div class="card-content">
                        <div class="table-wrapper">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Customer Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Address</th>
                                        <th>Quotations</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="customersTable">
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: var(--text-muted); padding: var(--spacing-xl);">
                                            <div class="empty-state">
                                                <div class="empty-state-icon"><i class="fas fa-users"></i></div>
                                                <div class="empty-state-title">No customers yet</div>
                                                <p style="color: var(--text-muted);">Add your first customer to get started</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="customerModalTitle">Add Customer</h2>
                <button class="modal-close" id="customerModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="customerForm" class="modal-body">
                <div class="form-grid">
                    <div class="form-input-group">
                        <label for="customerName">Customer Name *</label>
                        <input type="text" id="customerName" placeholder="Company/Customer name" required>
                    </div>

                    <div class="form-input-group">
                        <label for="customerEmail">Email</label>
                        <input type="email" id="customerEmail" placeholder="customer@example.com">
                    </div>

                    <div class="form-input-group">
                        <label for="customerPhone">Phone *</label>
                        <input type="tel" id="customerPhone" placeholder="9999999999" required>
                    </div>

                    <div class="form-input-group">
                        <label for="customerCity">City</label>
                        <input type="text" id="customerCity" placeholder="City">
                    </div>

                    <div class="form-input-group">
                        <label for="customerState">State</label>
                        <input type="text" id="customerState" placeholder="State">
                    </div>

                    <div class="form-input-group">
                        <label for="customerZip">Zip Code</label>
                        <input type="text" id="customerZip" placeholder="Zip Code">
                    </div>
                </div>

                <div class="form-input-group" style="margin-top: var(--spacing-lg);">
                    <label for="customerAddress">Address</label>
                    <textarea id="customerAddress" placeholder="Full address..."></textarea>
                </div>

                <div class="modal-footer" style="border-top: 1px solid var(--light-border); margin-top: var(--spacing-lg); padding-top: var(--spacing-lg);">
                    <button type="button" class="btn btn-secondary" id="cancelCustomerBtn">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Customer
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/customers.js"></script>
</body>
</html>
