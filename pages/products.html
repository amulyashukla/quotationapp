<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - AKB Engineering Quotation System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <i class="fas fa-cogs"></i>
                    </div>
                    <div class="sidebar-logo-text">
                        <h3>AKB</h3>
                        <p>Engineering</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="inquiries.html" class="nav-item">
                    <i class="fas fa-inbox"></i>
                    <span>Inquiries</span>
                </a>
                <a href="quotations.html" class="nav-item">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Quotations</span>
                </a>
                <a href="products.html" class="nav-item active">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
                <a href="customers.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="user-profile">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <h4 id="userName">Admin</h4>
                        <p>Administrator</p>
                    </div>
                </a>
                <button class="btn btn-secondary btn-sm" data-action="logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="header-title">
                        <h1>Products</h1>
                        <p>Manage your product inventory</p>
                    </div>
                </div>

                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="productSearch" placeholder="Search products...">
                    </div>

                    <div class="header-actions">
                        <button class="header-btn" id="themeToggleDashboard">
                            <i class="fas fa-moon"></i>
                        </button>
                        <button class="btn btn-primary btn-sm" id="addProductBtn">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <!-- Products Grid -->
                <div id="productsContainer" class="card">
                    <div class="card-header">
                        <h2>All Products</h2>
                    </div>
                    <div class="card-content">
                        <div class="table-wrapper">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Product Name</th>
                                        <th>Brand</th>
                                        <th>Price</th>
                                        <th>Category</th>
                                        <th>GST %</th>
                                        <th>Warranty</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="productsTable">
                                    <tr>
                                        <td colspan="7" style="text-align: center; color: var(--text-muted); padding: var(--spacing-xl);">
                                            <div class="empty-state">
                                                <div class="empty-state-icon"><i class="fas fa-box"></i></div>
                                                <div class="empty-state-title">No products yet</div>
                                                <p style="color: var(--text-muted);">Add your first product to get started</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="productForm" class="modal-body">
                <div class="form-grid">
                    <div class="form-input-group">
                        <label for="productName">Product Name *</label>
                        <input type="text" id="productName" placeholder="e.g., Centrifugal Pump" required>
                    </div>

                    <div class="form-input-group">
                        <label for="productBrand">Brand *</label>
                        <input type="text" id="productBrand" placeholder="e.g., Kirloskar" required>
                    </div>

                    <div class="form-input-group">
                        <label for="productCategory">Category *</label>
                        <select id="productCategory" required>
                            <option value="">Select category</option>
                            <option value="pumps">Industrial Pumps</option>
                            <option value="motors">Motors</option>
                            <option value="valves">Valves</option>
                            <option value="compressors">Compressors</option>
                            <option value="accessories">Accessories</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-input-group">
                        <label for="productPrice">Price (₹) *</label>
                        <input type="number" id="productPrice" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="form-input-group">
                        <label for="productGST">GST Percentage *</label>
                        <input type="number" id="productGST" placeholder="0" min="0" max="100" value="18" required>
                    </div>

                    <div class="form-input-group">
                        <label for="productQuantity">Quantity in Stock</label>
                        <input type="number" id="productQuantity" placeholder="0" min="0" value="0">
                    </div>

                    <div class="form-input-group">
                        <label for="productWarranty">Warranty (months)</label>
                        <input type="number" id="productWarranty" placeholder="24" min="0" value="24">
                    </div>

                    <div class="form-input-group">
                        <label for="productHP">Power (HP) - Optional</label>
                        <input type="text" id="productHP" placeholder="e.g., 5">
                    </div>
                </div>

                <div class="form-input-group" style="margin-top: var(--spacing-lg);">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" placeholder="Product details..."></textarea>
                </div>

                <div class="modal-footer" style="border-top: 1px solid var(--light-border); margin-top: var(--spacing-lg); padding-top: var(--spacing-lg);">
                    <button type="button" class="btn btn-secondary" id="cancelProductBtn">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/products.js"></script>
</body>
</html>
